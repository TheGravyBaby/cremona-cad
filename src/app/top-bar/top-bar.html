<div class="bar">
  <div class="title">CREMONA CAD</div>

  <div class="controls">
    <button class="btn" (click)="onSaveClick()">Save</button>
    <button class="btn" (click)="triggerFilePick()">Load</button>

    <select class="select" (change)="onSelectChange($event)">
      <option [selected]="selectedRecipe === 'Beard'">Beard Violin</option>
      <option [selected]="selectedRecipe === 'Denis'">Denis Violin</option>
    </select>

    <input
      #fileInput
      class="file"
      type="file"
      accept=".json,application/json"
      (change)="onFilePicked($event)"
    />
  </div>
</div>
