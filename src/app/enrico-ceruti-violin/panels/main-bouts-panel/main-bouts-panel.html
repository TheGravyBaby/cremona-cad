<section class="ui-group">
    <div class="ui-group-title">Upper Bout</div>
    <div class="input-group basic-row field-row" role="group">
        <label class="field-cell">
            <span class="field-title">Total Width <span class="unit-label">mm</span></span>
            <input type="number" class="basic-input" step="1" min="1" [(ngModel)]="params.bouts.UBW"
                (input)="onChange()" />
        </label>
        <button type="button" class="info-icon" (click)="boutWidthInfo()" title="More information"
            aria-label="Information">ⓘ</button>
        <!-- empty cell for spacing -->
        <label class="field-cell"></label>
        <label class="field-cell">
            <span class="field-title">UB to LB</span>
            <div class="basic-display" aria-label="Upper bout to lower bout ratio value">{{
                nearestFraction(params.ratios.UBtoLB) }}</div>
        </label>
    </div>

    <div class="ui-group">
        <div class="input-group basic-row field-row" role="group">
            <label class='field-cell'>
                <span class="field-title">U0 - Join Radius <span class="unit-label">mm</span></span>
                <input type="number" class="basic-input" step="1" min="1" [(ngModel)]="params.bouts.U0!.r"
                    (input)="onChange(); onArcFocus(params.bouts.U0!, colors.upperBout)" [style.borderColor]="colors.upperBout"
                    (focus)="onArcFocus(params.bouts.U0!, colors.upperBout)" (blur)="onArcBlur()" />
            </label>
            <label class="field-cell"></label>
            <label class='field-cell'>
                <span class="field-title">U0 to UBW</span>
                <div class="basic-display" aria-label="Upper bout to upper bout width ratio value">{{
                    nearestFraction(params.ratios.U0toUBW) }}</div>
            </label>
        </div>
        <div class="input-group basic-row field-row" role="group">
            <label class='field-cell'>
                <span class="field-title">U1 - Vesecai Radius <span class="unit-label">mm</span></span>
                <input type="number" class="basic-input" step="1" min="1" [(ngModel)]="params.bouts.U1!.r"
                    (input)="onChange(); onArcFocus(params.bouts.U1!, colors.upperBoutOff)" [style.borderColor]="colors.upperBoutOff"
                    (focus)="onArcFocus(params.bouts.U1!, colors.upperBoutOff)" (blur)="onArcBlur()" />
            </label>
            <label class="field-cell"></label>
            <label class='field-cell'>
                <span class="field-title">U1 to UBW</span>
                <div class="basic-display" aria-label="Lower bout to height ratio value">{{
                    nearestFraction(params.ratios.U1toUBW) }}</div>
            </label>
        </div>
    </div>
</section>

<section class="ui-group">
    <div class="ui-group-title">Lower Bout</div>
    <div class="input-group basic-row field-row" role="group">
        <label class="field-cell">
            <span class="field-title">Total Width <span class="unit-label">mm</span></span>
            <input type="number" class="basic-input" step="1" min="1" [(ngModel)]="params.bouts.LBW"
                (input)="onChange()" />
        </label>
        <button type="button" class="info-icon" (click)="boutWidthInfo()" title="More information"
            aria-label="Information">ⓘ</button>
        <!-- empty cell for spacing -->
        <label class="field-cell"></label>
        <label class="field-cell">
            <span class="field-title">LB to H</span>
            <div class="basic-display" aria-label="Lower bout to height ratio value">{{
                nearestFraction(params.ratios.LBtoH) }}</div>
        </label>
    </div>

    <div class="ui-group">
        <div class="input-group basic-row field-row" role="group">
            <label class='field-cell'>
                <span class="field-title">L0 - Join Radius <span class="unit-label">mm</span></span>
                <input type="number" class="basic-input" step="1" min="1" [(ngModel)]="params.bouts.L0!.r"
                    (input)="onChange(); onArcFocus(params.bouts.L0!, colors.lowerBout)" [style.borderColor]="colors.lowerBout"
                    (focus)="onArcFocus(params.bouts.L0!, colors.lowerBout)" (blur)="onArcBlur()" />
            </label>
            <label class="field-cell"></label>
            <label class='field-cell'>
                <span class="field-title">L0 to LBW</span>
                <div class="basic-display" aria-label="Lower bout to width ratio value">{{
                    nearestFraction(params.ratios.L0toLBW) }}</div>
            </label>
        </div>
        <div class="input-group basic-row field-row" role="group">
            <label class='field-cell'>
                <span class="field-title">L1 - Vesecai Radius <span class="unit-label">mm</span></span>
                <input type="number" class="basic-input" step="1" min="1" [(ngModel)]="params.bouts.L1!.r"
                    (input)="onChange(); onArcFocus(params.bouts.L1!, colors.lowerBoutOff)" [style.borderColor]="colors.lowerBoutOff"
                    (focus)="onArcFocus(params.bouts.L1!, colors.lowerBoutOff)" (blur)="onArcBlur()" />
            </label>
            <label class="field-cell"></label>
            <label class='field-cell'>
                <span class="field-title">L1 to LBW</span>
                <div class="basic-display" aria-label="Lower bout to width ratio value">{{
                    nearestFraction(params.ratios.L1toLBW) }}</div>
            </label>
        </div>
    </div>
</section>

<section class="ui-group">
    <div class="ui-group-title">Viol Neck</div>
    <div class="input-group basic-row field-row" role="group">
        <div class="toggle">
            <input type="checkbox" [(ngModel)]="params.options.useViolNeck"
                (change)="onChange()" /><span>Use Viol Neck </span>
        </div>
        <button type="button" class="info-icon" (click)="violNeckInfo()" title="More information"
            aria-label="Information">ⓘ</button>
    </div>

    @if (params.options.useViolNeck) {
    <div class="ui-group">
        <div class="input-group basic-row field-row" role="group">
            <label class="field-cell">
                <span class="field-title">V0 Radius <span class="unit-label">mm</span></span>
                <input type="number" class="basic-input" step="1" min="0" [(ngModel)]="params.viol.V0!.r" [style.borderColor]="colors.violNeck"
                    (input)="onChange(); onArcFocus(params.viol.V0!, colors.violNeck)"
                    (focus)="onArcFocus(params.viol.V0!, colors.violNeck)" (blur)="onArcBlur()" />
            </label>
            <label class="field-cell">
                <span class="field-title">V0 Start <span class="unit-label">°</span></span>
                <input type="number" class="basic-input" step="1" min="0" [ngModel]="getArcStartDeg(params.viol.V0!)" [style.borderColor]="colors.violNeck"
                    (ngModelChange)="setArcStartDeg(params.viol.V0!, $event, onChange.bind(this)); onArcFocus(params.viol.V0!, colors.violNeck)"
                    (focus)="onArcFocus(params.viol.V0!, colors.violNeck)" (blur)="onArcBlur()" />
            </label>
            <label class="field-cell">
                <span class="field-title">V0 End <span class="unit-label">°</span></span>
                <input type="number" class="basic-input" step="1" min="0" [ngModel]="getArcEndDeg(params.viol.V0!)" [style.borderColor]="colors.violNeck"
                    (ngModelChange)="setArcEndDeg(params.viol.V0!, $event, onChange.bind(this)); onArcFocus(params.viol.V0!, colors.violNeck)"
                    (focus)="onArcFocus(params.viol.V0!, colors.violNeck)" (blur)="onArcBlur()" />
            </label>
        </div>
        <div class="input-group basic-row field-row" role="group">
            <label class="field-cell">
                <span class="field-title">Width <span class="unit-label">mm</span></span>
                <input type="number" class="basic-input" step="1" [(ngModel)]="params.viol.width"
                    (input)="onChange()" />
            </label>
        </div>
    </div>
    }

</section>

<app-ceruti-render-toggles [flags]="flags" (changed)="onChange()"></app-ceruti-render-toggles>
