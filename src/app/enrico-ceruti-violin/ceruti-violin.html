<div class="panel">
    <div class="panel-nav-wrap">
        <app-recipe-toolbar
            [recipeName]="d.recipeName"
            [templateOptions]="templateOptions"
            [activeTemplateKey]="selectedTemplateKey"
            (newFile)="onNewClick()"
            (saveFile)="saveToDisk()"
            (loadFile)="loadFile($event)"
            (templateSelect)="loadTemplate($event)">
        </app-recipe-toolbar>
        <section class="panel-nav" aria-label="Sidebar section navigation">
            <label class="ui-group-title">Select Recipe Step</label>
            <div class="panel-nav-controls">
                <button type="button" class="panel-nav-btn panel-nav-btn--back" (click)="stepPanel(-1)"
                    title="Previous section" aria-label="Go to previous section" [disabled]="!canStepPanel(-1)">
                    Back
                </button>
                <div class="panel-select-wrap">
                    <select id="panel-selector" class="panel-select" [ngModel]="openPanel"
                        (ngModelChange)="onPanelSelect($event)">
                        @for (panel of panelOrder; track panel.id) {
                        <option [value]="panel.id" [disabled]="!isPanelEnabled(panel.id)">
                            {{ panel.label }}@if (!isPanelEnabled(panel.id)) { (Locked) }
                        </option>
                        }
                    </select>
                    <span class="panel-select-caret" aria-hidden="true">&#x25BE;</span>
                </div>
                <button type="button" class="panel-nav-btn panel-nav-btn--next" (click)="stepPanel(1)"
                    title="Next section" aria-label="Go to next section" [disabled]="!canStepPanel(1)">
                    Next
                </button>
            </div>
            <div class="panel-progress" role="progressbar" aria-label="Section progress" aria-valuemin="1"
                [attr.aria-valuemax]="panelProgressMax" [attr.aria-valuenow]="panelProgressNow">
                <div class="panel-progress-fill" [style.width.%]="panelProgressPercent"></div>
            </div>
        </section>
    </div>

    <div class="panel-content">
        @if (openPanel === 'base') {
        <app-ceruti-base-panel
            [params]="d.params"
            [fileName]="d.fileName"
            (fileNameChange)="d.fileName = $event"
            [description]="d.description"
            (descriptionChange)="d.description = $event"
            (changed)="changeBaseMeasurements()"
            (referenceFileSelected)="onReferenceFileSelected($event)">
        </app-ceruti-base-panel>
        }

        @if (openPanel === 'mainBouts') {
        <app-ceruti-main-bouts-panel
            [params]="d.params"
            [colors]="colors"
            [flags]="viewFlags"
            (changed)="changeMainBouts()"
            (arcFocus)="onArcFocus($event.arc, $event.color)"
            (arcBlur)="onArcBlur()">
        </app-ceruti-main-bouts-panel>
        }

        @if (openPanel === 'corners') {
        <app-ceruti-corners-panel
            [params]="d.params"
            [colors]="colors"
            [flags]="viewFlags"
            (changed)="changeCorners()"
            (arcFocus)="onArcFocus($event.arc, $event.color)"
            (arcBlur)="onArcBlur()">
        </app-ceruti-corners-panel>
        }

        @if (openPanel === 'centerBout') {
        <app-ceruti-center-bout-panel
            [params]="d.params"
            [colors]="colors"
            [flags]="viewFlags"
            (changed)="changeCenterBout($event)"
            (arcFocus)="onArcFocus($event.arc, $event.color)"
            (arcBlur)="onArcBlur()">
        </app-ceruti-center-bout-panel>
        }

        @if (openPanel === 'outerTrace') {
        <app-ceruti-outer-trace-panel
            [params]="d.params"
            [colors]="colors"
            [flags]="viewFlags"
            (changed)="changeOuterTrace()"
            (arcFocus)="onArcFocus($event.arc, $event.color)"
            (arcBlur)="onArcBlur()">
        </app-ceruti-outer-trace-panel>
        }

        @if (openPanel === 'mould') {
        <app-ceruti-mould-panel
            [params]="d.params"
            [colors]="colors"
            [flags]="viewFlags"
            (changed)="changeMould()">
        </app-ceruti-mould-panel>
        }

        @if (openPanel === 'longArching') {
        <app-ceruti-long-arching-panel
            [params]="d.params"
            [colors]="colors"
            [flags]="viewFlags"
            (changed)="changeLongArching()">
        </app-ceruti-long-arching-panel>
        }

        @if (openPanel === 'export') {
        <app-ceruti-export-panel
            [params]="d.params"
            [colors]="colors"
            [paths]="d.paths"
            [fileName]="d.fileName"
            [description]="d.description ?? ''"
            (draftChange)="draftChange.emit($event)">
        </app-ceruti-export-panel>
        }
    </div>
</div>
