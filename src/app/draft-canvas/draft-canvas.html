<div class="canvas-shell" [class.dark-mode]="isDarkMode">
  <div #host class="host" tabindex="0" aria-label="Draft canvas" (wheel)="onScrollWheel($event)"
    (pointerdown)="onPointerDown($event)" (pointermove)="onPointerMove($event)" (pointerup)="onPointerUp($event)"
    (pointerleave)="onPointerUp($event)" (keydown)="onKeyDown($event)"></div>

  <div class="ui-controls">
    <div class="left">
      <!-- <button type="button" class="btn" (click)="darkMode()">Dark Mode</button> -->

      <button type="button" class="btn" (click)="fitCamera(); draw()">Fit</button>

      <div class="sep"></div>

      <button type="button" class="btn" (click)="applyZoom(pxPerMm / 1.1)">−</button>
      <div class="readout">Zoom: {{ pxPerMm.toFixed(1) }} px/mm</div>
      <button type="button" class="btn" (click)="applyZoom(pxPerMm * 1.1)">+</button>
    </div>

    <div class="right">
      <label class="chk">
        <input type="checkbox" [(ngModel)]="showGrid" (change)="onDisplayPreferenceChange()" />
        Grid
      </label>

      <label class="chk">
        <input type="checkbox" [(ngModel)]="showAxes" (change)="onDisplayPreferenceChange()" />
        Axes
      </label>

      <label class="chk">
        <input type="checkbox" [(ngModel)]="showReferenceImage" (change)="onDisplayPreferenceChange()" />
        Reference
      </label>
      <div class="align-controls">
        <button type="button" class="btn" [class.active]="referenceModeEnabled" (click)="toggleAlignPopup()">
          Align Reference
        </button>
        @if(referenceModeEnabled) {
        <div class="align-popup">
          <div class="row">
            <label>X (mm)</label>
            <input type="number" [ngModel]="referenceImage?.x" (ngModelChange)="onRefParamChange('x', $event)" />
          </div>
          <div class="row">
            <label>Y (mm)</label>
            <input type="number" [ngModel]="referenceImage?.y" (ngModelChange)="onRefParamChange('y', $event)" />
          </div>
          <div class="row">
            <label>Width (mm)</label>
            <input type="number" [ngModel]="referenceImage?.width"
              (ngModelChange)="onRefParamChange('width', $event)" />
          </div>
          <div class="row">
            <label>Height (mm)</label>
            <input type="number" [ngModel]="referenceImage?.height"
              (ngModelChange)="onRefParamChange('height', $event)" />
          </div>
          <div class="row">
            <label class="chk">
              <input type="checkbox" [(ngModel)]="lockAspect" />
              Lock aspect
            </label>
            <button type="button" class="btn" (click)="resetReferenceImage()">Reset</button>
          </div>
        </div>
        }
      </div>

    </div>
  </div>
