<div class="panel">
  <details open>
    <summary>Base</summary>
    <label>
      Height (mm)
      <input type="number" step="1" [(ngModel)]="beardRecipe.data.heightMm" (input)="changeBase()" />
    </label>
    <br>
    <label>
      Height : Width ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="beardRecipe.data.ratioHeight" (input)="changeBase()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="beardRecipe.data.ratioWidth" (input)="changeBase()" />
      </div>
    </label>

    <br>
     <label>
      Upper Bout Reduction Part
      <div class="ratio">
        1
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="beardRecipe.data.upperBoutReduction" (input)="changeBase()" />
      </div>
    </label>
  </details>
</div>
