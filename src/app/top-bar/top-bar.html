<div class="bar">
  <div class="brand">
    <div class="title">CREMONA CAD</div>
    <button
      class="btn icon-btn"
      [class.active]="nightMode"
      (click)="onNightModeToggle()"
      [attr.aria-pressed]="nightMode"
      [attr.aria-label]="nightMode ? 'Switch to day mode' : 'Switch to night mode'">
      {{ nightMode ? '☾' : '☀' }}
    </button>
  </div>

  <div class="controls">
    Select Recipe: 
    <select class="select" (change)="onSelectChange($event)">
      <option [selected]="selectedRecipe === 'Kelly'">Kelly Violin</option>
      <option [selected]="selectedRecipe === 'Beard'">Beard Violin</option>
      <option [selected]="selectedRecipe === 'Denis'">Denis Violin</option>
    </select>

    <button class="btn" (click)="onNewClick()">New</button>
    <button class="btn" (click)="onSaveClick()">Save</button>
    <button class="btn" (click)="triggerFilePick()">Load</button>
    <input
      #fileInput
      class="file"
      type="file"
      accept=".json,application/json"
      (change)="onFilePicked($event)"
    />
  </div>
</div>
