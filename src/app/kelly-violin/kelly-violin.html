<div class="panel">
    <details [open]="openPanel === 'base'" (toggle)="onToggle('base', $event);">
        <summary>Base</summary>
        <label>
            File Name
            <input type="string" [(ngModel)]="d.fileName" />
        </label>

        <label class="file-upload">
            Upload Reference Image
            <input type="file" accept="image/*" (change)="onReferenceFileSelected($event)" />
        </label>
        <br><br>
        <label>
            Height : Width (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.h" (input)="changeBaseMeasurements()" />
                <span>:</span>
                <input type="number" step="1" min="1" [(ngModel)]="d.params.w" (input)="changeBaseMeasurements()" />
            </div>
        </label>
        <br>
        <label>
            Edge Inset (mm)
            <div class="textBoxInput">
                <input type="number" step=".1" min="0" [(ngModel)]="d.params.inset"
                    (input)="changeBaseMeasurements()" />
                <span class="info-icon" [title]="insetTooltip">ⓘ</span>
            </div>
        </label>
    </details>

    <details [open]="openPanel === 'mainBouts'" (toggle)="onToggle('mainBouts', $event)">
        <summary>Major Bout Circles</summary>

        <label>
            Upper Bout Radius : Height (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.upperBoutRadius" (input)="changeMainBouts()" />
                <span>:</span>
                <input type="number" step="1" min="0" [(ngModel)]="d.params.upperBoutCenter" (input)="changeMainBouts()" />

            </div>
        </label>

        <br>

         <label> 
            Center Bout Radius (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.centerBoutRadius" (input)="changeMainBouts()" />
            </div>
        </label>

        <br>

        <label> 
            Lower Bout Radius : Height (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.lowerBoutRadius" (input)="changeMainBouts()" />
                <span>:</span>
                <input type="number" step="1" min="0" [(ngModel)]="d.params.lowerBoutCenter" (input)="changeMainBouts()" />

            </div>
        </label>

        <br>

        Show Inset Guides 
        <input type="checkbox" [(ngModel)]="showInsetGuides" (change)="changeMainBouts()" />
    </details>

    <details [open]="openPanel === 'minorBouts'" (toggle)="onToggle('minorBouts', $event)">
        <summary>Minor Bout Circles</summary>

        <label>
            Upper Vesaci Radius (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.upperVesaciRadius" (input)="changeMinorBouts()" />
            </div>
        </label>

        <br>

        <label>
            Lower Vesaci Radius (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.lowerVesaciRadius" (input)="changeMinorBouts()" />
            </div>
        </label>

        Show Reference Circles
        <input type="checkbox" [(ngModel)]="showCircles" (change)="changeMinorBouts()" />
        

  
    </details>

    <details [open]="openPanel === 'cornerPlacement'" (toggle)="onToggle('cornerPlacement', $event)">
        <summary>Corner Placement</summary>

        <label>
            Center Bout Target Radius (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.cornerTargetRadius" (input)="changeCornerPlacement()" />
            </div>
        </label>

        <br>

        <label>
            Upper Corner Guide Y-Intercept : X-Offset (mm)
            <div class="ratio">
                <input type="number" step="1" [(ngModel)]="d.params.upperCornerGuideYIntercept" (input)="changeCornerPlacement()" />
                <span>:</span>
                <input type="number" step="1" [(ngModel)]="d.params.upperCornerGuideXOffset" (input)="changeCornerPlacement()" />
                <button class="btn" >V</button>
                <button class="btn" >Y</button>
                <button class="btn" >X</button>
            </div>
        </label>

        <br>  

        <label>
            Lower Corner Guide Y-Intercept : X-Offset (mm)
            <div class="ratio">
                <input type="number" step="1" [(ngModel)]="d.params.lowerCornerGuideYIntercept" (input)="changeCornerPlacement()" />
                <span>:</span>
                <input type="number" step="1" [(ngModel)]="d.params.lowerCornerGuideXOffset" (input)="changeCornerPlacement()" />
                <button class="btn" >V</button>
                <button class="btn" >Y</button>
                <button class="btn" >X</button>

            </div>
        </label>
    </details>


</div>
