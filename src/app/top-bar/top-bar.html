<div class="bar">
  <div class="brand">
    <div class="title">
      <img src="CremonaCadLogo.svg" alt="Cremona CAD" />
    </div>
    <button class="btn icon-btn" (click)="aboutModal.open()" aria-label="About Cremona CAD">?</button>
    <button class="btn icon-btn" [class.active]="nightMode" (click)="onNightModeToggle()"
      [attr.aria-pressed]="nightMode" [attr.aria-label]="nightMode ? 'Switch to day mode' : 'Switch to night mode'">
      {{ nightMode ? '☾' : '☀' }}
    </button>
  </div>

  <div class="controls">
    <!-- this is commented out until more recipes are developed
     there is a hello world recipe if you are interested in experimenting
     and two archived recipes in the examples directory -->
    <!-- <select class="select" (change)="onSelectChange($event)">
      <option value="enrico-ceruti-violin" [selected]="selectedRecipe === 'enrico-ceruti-violin'">Enrico Ceruti Violin</option>
      <option value="hello-recipe" [selected]="selectedRecipe === 'hello-recipe'">Hello Recipe</option>
    </select> -->
  </div>

</div>

<app-about-modal #aboutModal></app-about-modal>
