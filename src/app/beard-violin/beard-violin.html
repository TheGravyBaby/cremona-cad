<div class="panel">

  <details [open]="openPanel === 'base'" (toggle)="onToggle('base', $event);">
    <summary>Base</summary>
    <label>
      Height (mm)
      <input type="number" step="1" [(ngModel)]="d.ratios.heightMm" (input)="changeBase()" />
    </label>
    <br>
    <label>
      Height : Width Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.heightPart" (input)="changeBase()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.widthPart" (input)="changeBase()" />
      </div>
    </label>

    <br>
    <label>
      Upper Bout : Lower Bout Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.upperBoutWidthNum" (input)="changeBase()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.upperBoutWidthDen" (input)="changeBase()" />
      </div>
    </label>
  </details>



  <details [open]="openPanel === 'lowerBout'" (toggle)="onToggle('lowerBout', $event)">
    <summary>Lower Bout</summary>

    <label>
      Vesica Radius : Gap Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.lowerRadiiPart" (input)="changeLowerVesica()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.lowerGapPart" (input)="changeLowerVesica()" />
      </div>
    </label>

    <br>

    <label>
      Join Arc Length : Height Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.lowerJoinRatioNum" (input)="changeLowerVesica()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.lowerJoinRatioDen" (input)="changeLowerVesica()" />
      </div>
    </label>

    <!-- Error message -->
    @if (lowerBoutError !== '') {
    <div class="calc-error">
      {{ lowerBoutError }}
    </div>
    }

    <br>
  </details>




  <details [open]="openPanel === 'upperBout'" (toggle)="onToggle('upperBout', $event)">
    <summary>Upper Bout</summary>
    <label>
      Vesica Radius : Distance Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.upperRadiiPart" (input)="changeUpperVesica()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.upperGapPart" (input)="changeUpperVesica()" />
      </div>
    </label>

    <br>

    <label>
      Join Arc Length : Height Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.upperJoinRatioNum" (input)="changeUpperVesica()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.upperJoinRatioDen" (input)="changeUpperVesica()" />
      </div>
    </label>
    <br>

    <!-- Error message -->
    @if (upperBoutError !== '') {
    <div class="calc-error">
      {{ upperBoutError }}
    </div>
    }
  </details>

  <details [open]="openPanel === 'centerBouts'" (toggle)="onToggle('centerBouts', $event)">
    <summary>Corner Placement</summary>
    <!-- <label>
      Waist Center : Body Ratio
      <div class="ratio">
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.waistCenterNum" (input)="changeCenterBouts()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.waistCenterDen" (input)="changeCenterBouts()" />
      </div>
    </label> -->

    <label>
      Center Section : Height 
      <div class="ratio">
        <input type="number" step="1" min="0" [(ngModel)]="d.ratios.centerSectionNum" (input)="changeCenterBouts()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.centerSectionDen" (input)="changeCenterBouts()" />
      </div>
    </label>
    
    <br>

     <label>
      Upper Corner Section : Center Section 
      <div class="ratio">
        <input type="number" step="1" min="0" [(ngModel)]="d.ratios.upperCornerPart" (input)="changeCenterBouts()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.centerSectionParts" (input)="changeCenterBouts()" />
      </div>
    </label>

    <br>

     <label>
      Lower Corner Section : Center Section 
      <div class="ratio">
        <input type="number" step="1" min="0" [(ngModel)]="d.ratios.lowerCornerPart" (input)="changeCenterBouts()" />
        <span>:</span>
        <input type="number" step="1" min="1" [(ngModel)]="d.ratios.centerSectionParts" (input)="changeCenterBouts()" />
      </div>
    </label>


     <!-- Error message -->
    @if (centerBoutError !== '') {
    <div class="calc-error">
      {{ lowerBoutError }}
    </div>
    }

  </details>


</div>
