<div class="panel">
      <details open>
        <summary>Base</summary>
        <div class="section">
          <label>
            Body length (mm)
            <input type="number" [(ngModel)]="bodyLengthMm" />
          </label>
           <label>
            Height to Width Ratio
            <input type="number" step="0.001" [(ngModel)]="heightToWidth" />
          </label>
        </div>
      </details>

      <details>
        <summary>Bouts</summary>
        <div class="section">
          <div class="hint">Placeholder fields</div>
        </div>
      </details>

      <details>
        <summary>C-bouts / corners</summary>
        <div class="section">
          <div class="hint">Later</div>
        </div>
      </details>
    </div>
