<div class="panel">
    <details [open]="openPanel === 'base'" (toggle)="onToggle('base', $event);">
        <summary>Base</summary>
        <label>
            File Name
            <input type="string" [(ngModel)]="d.fileName" />
        </label>

        <label class="file-upload">
            Upload Reference Image
            <input type="file" accept="image/*" (change)="onReferenceFileSelected($event)" />
        </label>
        <br><br>
        <label>
            Height : Width (mm)
            <div class="ratio">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.h" (input)="changeBaseMeasurements()" />
                <span>:</span>
                <input type="number" step="1" min="1" [(ngModel)]="d.params.w" (input)="changeBaseMeasurements()" />
            </div>
        </label>
        <br>
        <label>
            Edge Inset (mm)
            <div class="textBoxInput">
                <input type="number" step=".1" min="0" [(ngModel)]="d.params.inset"
                    (input)="changeBaseMeasurements()" />
                <span class="info-icon" [title]="insetTooltip">ⓘ</span>
            </div>
        </label>
    </details>

    <details [open]="openPanel === 'centerBouts'" (toggle)="onToggle('centerBouts', $event)">
        <summary>Bout Circles</summary>
        
        <label>
            Center Bout Width (mm)
            <div class="textBoxInput">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.centerBoutWidth"
                    (input)="changeCenterBout()" />
            </div>
        </label>

        <br>

        <label> 
            Center Bout Height (mm)
            <div class="textBoxInput">
                <input type="number" step="1" min="0" [(ngModel)]="d.params.centerBoutHeight"
                    (input)="changeCenterBout()" />
            </div>
        </label>

        <br>

        <label>
            Center Bout Radius (mm)
            <div class="textBoxInput">
                <input type="number" step="1" min="1" [(ngModel)]="d.params.centerBoutRadius" (input)="changeCenterBout()" />
            </div>
        </label>
    </details>

</div>
